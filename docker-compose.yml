services:
  m20-character-generator:
    build: .
    image: m20-character-generator:latest
    container_name: m20-character-generator
    ports:
      - "8080:3000"
    volumes:
      - ./data:/data
      - ./app/public:/app/public:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
